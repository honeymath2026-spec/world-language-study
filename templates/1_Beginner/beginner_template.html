/* ============================================================
   🎮 MATCHING GAME - CONNECT WITH LINES
   ============================================================ */

.match-game-container {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 40px;
    padding: 20px 10px;
    min-height: 400px;
    flex-wrap: wrap;
}

.match-column {
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
    min-width: 120px;
}

.match-column-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #2c3e50;
    text-align: center;
    padding: 8px;
    background: #f0f3f8;
    border-radius: 30px;
    margin-bottom: 8px;
}

.match-drag-item {
    padding: 16px 24px;
    background: white;
    border: 4px solid #ddd;
    border-radius: 60px;
    font-size: 1.6rem;
    font-weight: 600;
    text-align: center;
    cursor: grab;
    transition: all 0.2s ease;
    user-select: none;
    touch-action: none;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.match-drag-item:active {
    cursor: grabbing;
}

.match-drag-item.dragging {
    opacity: 0.5;
    transform: scale(0.95);
}

.match-drag-item.droppable {
    border-color: #f1c40f;
    background: #fef9ef;
    transform: scale(1.02);
}

.match-drag-item.matched-left {
    border-color: #27ae60;
    background: #d5f5e3;
    cursor: default;
    opacity: 0.7;
}

.match-drag-item.matched-right {
    border-color: #27ae60;
    background: #d5f5e3;
    cursor: default;
    opacity: 0.7;
}

.match-drag-item.wrong-match {
    border-color: #e74c3c;
    background: #fadbd8;
    animation: shake 0.4s ease;
}

/* SVG 선을 그릴 컨테이너 */
.match-svg-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
}

.match-svg-container line {
    stroke-width: 4;
    stroke-linecap: round;
}

.match-line-correct {
    stroke: #27ae60;
}

.match-line-wrong {
    stroke: #e74c3c;
}

/* 쉐이크 애니메이션 */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

/* ===== 반응형 ===== */
@media (max-width: 768px) {
    .match-game-container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    
    .match-column {
        width: 100%;
        min-width: unset;
    }
    
    .match-drag-item {
        font-size: 1.3rem;
        padding: 12px 18px;
        min-height: 55px;
    }
}

@media (max-width: 480px) {
    .match-drag-item {
        font-size: 1.1rem;
        padding: 10px 14px;
        min-height: 45px;
        border-radius: 40px;
    }
    
    .match-column-title {
        font-size: 1rem;
    }
}

async function loadUnit() {
    const unitStr = String(unitNum).padStart(2, '0');
    const unitPath = `../../data/1_Beginner/unit_${unitStr}.json`;

    try {
        const response = await fetch(unitPath);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const unitData = await response.json();
        renderPage(unitData);
    } catch (err) {

        document.getElementById('main-content').innerHTML = `

// 기본 TTS 함수 - preintermediate 방식 그대로 사용
function speakText(text) {
    if (window.TTS) {
        window.TTS.setLanguage(lang);
        window.TTS.speak(text);
    }
}

// 인코딩된 문자열을 디코딩해서 TTS 실행
function speakItemDecode(encodedText, encodedSound) {
    const text = decodeURIComponent(encodedText);
    const sound = decodeURIComponent(encodedSound || text);
    speakText(sound);
}

// 간단한 단어/문장 TTS (아포스트로피 문제 없음)
function speakItem(word, sound) {
    const text = sound || word;
    speakText(text);
}


// ============================================================
// 🎮 매칭 게임 - 드래그 & 드롭 + 선 그리기
// ============================================================

var dragData = null;
var matchPairs = {};
var matchedLeft = {};
var matchedRight = {};

// ---------- 드래그 시작 (마우스) ----------
function dragStart(event, gameIdx, pairIdx) {
    var el = event.target.closest('.match-drag-item');
    if (el.classList.contains('matched-left')) {
        event.preventDefault();
        return;
    }
    dragData = {
        gameIdx: gameIdx,
        pairIdx: pairIdx,
        type: 'left'
    };
    el.classList.add('dragging');
    event.dataTransfer.setData('text/plain', '');
    event.dataTransfer.effectAllowed = 'move';
}

// ---------- 드래그 종료 (마우스) ----------
function dragEnd(event) {
    var el = event.target.closest('.match-drag-item');
    if (el) {  // ✅ el이 있을 때만 실행
        el.classList.remove('dragging');
    }
    document.querySelectorAll('.match-drag-item.droppable').forEach(function(o) {
        o.classList.remove('droppable');
    });
}

// ---------- 드래그 오버 (마우스) ----------
function dragOver(event) {
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    var target = event.target.closest('.match-drag-item');
    if (target && target.classList.contains('match-right') && !target.classList.contains('matched-right')) {
        target.classList.add('droppable');
    }
}

// ---------- 드롭 (마우스) ----------
function drop(event, gameIdx, pairIdx) {
    event.preventDefault();
    var target = event.target.closest('.match-drag-item');
    if (!target) return;
    target.classList.remove('droppable');
    
    if (!dragData) return;
    if (dragData.gameIdx !== gameIdx) return;
    if (target.classList.contains('matched-right')) return;
    
    var leftEl = document.getElementById('left-' + gameIdx + '-' + dragData.pairIdx);
    var rightEl = document.getElementById('right-' + gameIdx + '-' + pairIdx);
    
    // 매칭 확인
    if (dragData.pairIdx === pairIdx) {
        // 정답!
        leftEl.classList.add('matched-left');
        leftEl.classList.remove('dragging');
        rightEl.classList.add('matched-right');
        rightEl.draggable = false;
        
        matchedLeft[gameIdx] = matchedLeft[gameIdx] || [];
        matchedLeft[gameIdx].push(dragData.pairIdx);
        matchedRight[gameIdx] = matchedRight[gameIdx] || [];
        matchedRight[gameIdx].push(pairIdx);
        
        // 선 그리기
        drawMatchLine(gameIdx, dragData.pairIdx, pairIdx, true);
        
        // 피드백 업데이트
        updateMatchFeedback(gameIdx);
    } else {
        // 오답
        leftEl.classList.add('wrong-match');
        rightEl.classList.add('wrong-match');
        setTimeout(function() {
            leftEl.classList.remove('wrong-match');
            rightEl.classList.remove('wrong-match');
            leftEl.classList.remove('dragging');
        }, 500);
    }
    
    dragData = null;
}

// ---------- 터치 지원 (모바일) ----------
var touchData = null;
var touchClone = null;

function touchStart(event, gameIdx, pairIdx) {
    var el = event.target.closest('.match-drag-item');
    if (el.classList.contains('matched-left')) return;
    
    var touch = event.touches[0];
    touchData = {
        gameIdx: gameIdx,
        pairIdx: pairIdx,
        startX: touch.clientX,
        startY: touch.clientY
    };
    
    // 드래그 중인 요소 복제 (시각적 피드백)
    touchClone = el.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.opacity = '0.7';
    touchClone.style.zIndex = '1000';
    touchClone.style.width = el.offsetWidth + 'px';
    touchClone.style.left = (touch.clientX - el.offsetWidth/2) + 'px';
    touchClone.style.top = (touch.clientY - el.offsetHeight/2) + 'px';
    touchClone.style.transform = 'scale(1.05)';
    document.body.appendChild(touchClone);
    
    el.classList.add('dragging');
}

function touchMove(event, gameIdx, pairIdx) {
    event.preventDefault();
    if (!touchData) return;
    if (touchData.gameIdx !== gameIdx) return;
    
    var touch = event.touches[0];
    if (touchClone) {
        touchClone.style.left = (touch.clientX - touchClone.offsetWidth/2) + 'px';
        touchClone.style.top = (touch.clientY - touchClone.offsetHeight/2) + 'px';
    }
    
    var elements = document.elementsFromPoint(touch.clientX, touch.clientY);
    var target = null;
    for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.classList && el.classList.contains('match-right') && !el.classList.contains('matched-right')) {
            target = el;
            break;
        }
    }
    
    document.querySelectorAll('.match-drag-item.droppable').forEach(function(o) {
        o.classList.remove('droppable');
    });
    if (target) {
        target.classList.add('droppable');
    }
}

function touchEnd(event) {
    if (!touchData) return;
    
    var touch = event.changedTouches[0];
    var elements = document.elementsFromPoint(touch.clientX, touch.clientY);
    var target = null;
    for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.classList && el.classList.contains('match-right') && !el.classList.contains('matched-right')) {
            target = el;
            break;
        }
    }
    
    if (target) {
        var rightId = target.id;
        var parts = rightId.split('-');
        var pairIdx = parseInt(parts[2]);
        var fakeEvent = { preventDefault: function() {}, target: target };
        drop(fakeEvent, touchData.gameIdx, pairIdx);
    }
    
    if (touchClone) {
        touchClone.remove();
        touchClone = null;
    }
    document.querySelectorAll('.match-drag-item.dragging').forEach(function(o) {
        o.classList.remove('dragging');
    });
    document.querySelectorAll('.match-drag-item.droppable').forEach(function(o) {
        o.classList.remove('droppable');
    });
    touchData = null;
}

// ---------- 선 그리기 ----------
function drawMatchLine(gameIdx, leftPair, rightPair, isCorrect) {
    var svg = document.getElementById('match-svg-' + gameIdx);
    if (!svg) return;
    
    var leftEl = document.getElementById('left-' + gameIdx + '-' + leftPair);
    var rightEl = document.getElementById('right-' + gameIdx + '-' + rightPair);
    if (!leftEl || !rightEl) return;
    
    var container = document.getElementById('match-game-' + gameIdx);
    var containerRect = container.getBoundingClientRect();
    
    var leftRect = leftEl.getBoundingClientRect();
    var rightRect = rightEl.getBoundingClientRect();
    
    var x1 = leftRect.right - containerRect.left;
    var y1 = leftRect.top + leftRect.height/2 - containerRect.top;
    var x2 = rightRect.left - containerRect.left;
    var y2 = rightRect.top + rightRect.height/2 - containerRect.top;
    
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.classList.add(isCorrect ? 'match-line-correct' : 'match-line-wrong');
    line.setAttribute('stroke', isCorrect ? '#27ae60' : '#e74c3c');
    line.setAttribute('stroke-width', '4');
    line.setAttribute('stroke-linecap', 'round');
    
    // 애니메이션 효과 (선이 그려지는 효과)
    var length = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
    line.style.strokeDasharray = length;
    line.style.strokeDashoffset = length;
    line.style.transition = 'stroke-dashoffset 0.5s ease';
    
    svg.appendChild(line);
    
    // 다음 프레임에서 애니메이션 실행
    requestAnimationFrame(function() {
        line.style.strokeDashoffset = '0';
    });
}

// ---------- 피드백 업데이트 ----------
function updateMatchFeedback(gameIdx) {
    var fb = document.getElementById('match-feedback-' + gameIdx);
    if (!fb) return;
    
    var leftItems = document.querySelectorAll('#match-left-' + gameIdx + ' .match-drag-item');
    var total = leftItems.length;
    var matched = matchedLeft[gameIdx] ? matchedLeft[gameIdx].length : 0;
    
    if (matched === total) {
        fb.innerHTML = '🎉 모두 맞췄어요! 잘했어요!';
        fb.style.color = '#27ae60';
    } else {
        fb.innerHTML = '✅ ' + matched + ' / ' + total + ' 연결 완료!';
        fb.style.color = '#f39c12';
    }
}

function renderPage(unit) {

// ---------- 유닛 선택기 ----------
function buildUnitSelector() {
    const sel = document.getElementById('unit-selector');
    if (!sel) return;
    let html = '';
    for (let i = 1; i <= 14; i++) {
        const active = (i === unitNum) ? 'active' : '';
        html += `<button class="unit-btn ${active}" onclick="navigateUnit(${i})">${i}</button>`;
    }
    sel.innerHTML = html;
}

function navigateUnit(u) {
    window.location.href = `beginner_template.html?lang=${lang}&unit=${u}&_=${Date.now()}`;
}

// ---------- 녹음 관련 ----------
let recordings = {};
let recorders = {};

function toggleRecord(idx, encodedText) {
    const btn = document.getElementById(`rec-btn-${idx}`);
    if (!btn) return;

    if (recorders[idx] && recorders[idx].state === 'recording') {
        recorders[idx].stop();
        btn.textContent = t.record_btn;
        btn.classList.remove('recording');
        return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        const recorder = new MediaRecorder(stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            recordings[idx] = URL.createObjectURL(blob);
            const playBtn = document.getElementById(`play-btn-${idx}`);
            if (playBtn) playBtn.style.display = 'inline-block';
            stream.getTracks().forEach(t => t.stop());
            btn.textContent = t.record_btn;
            btn.classList.remove('recording');
        };
        recorder.start();
        recorders[idx] = recorder;
        btn.textContent = t.stop_btn;
        btn.classList.add('recording');
    }).catch(() => alert('🎤 Please allow microphone access.'));
}

function playRecord(idx) {
    if (recordings[idx]) {
        new Audio(recordings[idx]).play();
    }
}

// ---------- 스토리 옵션 (개선 버전) ----------
function checkStoryOption(el, isCorrect) {
    var fb = document.getElementById('story-feedback');
    if (!fb) return;
    
    // 모든 옵션 비활성화 (한 번만 선택 가능)
    var allOptions = document.querySelectorAll('.story-option');
    allOptions.forEach(function(o) {
        o.style.pointerEvents = 'none';
        o.style.opacity = '0.6';
    });
    
    if (isCorrect === 'true') {
        el.classList.add('correct-answer');
        fb.innerHTML = '🎉 정답입니다! 잘했어요!';
        fb.style.color = '#27ae60';
    } else {
        el.classList.add('wrong-answer');
        fb.innerHTML = '😊 다시 생각해볼까요?';
        fb.style.color = '#e74c3c';
        // 정답 표시
        allOptions.forEach(function(o) {
            if (o.dataset.correct === 'true') {
                o.classList.add('correct-answer');
            }
        });
    }
}




// ---------- 매칭 게임 ----------
let matchSelections = {};

function matchPair(el, actIdx, pairIdx) {
    const row = document.getElementById(`match-row-${actIdx}`);
    if (!row) return;
    const items = row.querySelectorAll('.match-item');
    const fb = document.getElementById(`match-feedback-${actIdx}`);
    if (!fb) return;

    if (!matchSelections[actIdx]) matchSelections[actIdx] = [];
    const sel = matchSelections[actIdx];

    if (sel.includes(pairIdx)) {
        sel.splice(sel.indexOf(pairIdx), 1);
        el.classList.remove('matched');
        return;
    }

    sel.push(pairIdx);
    el.classList.add('matched');

    const totalPairs = items.length / 2;
    if (sel.length === totalPairs) {
        fb.innerHTML = `${t.correct} 🎉`;
        fb.style.color = '#27ae60';
    } else {
        fb.innerHTML = `✅ ${sel.length}/${totalPairs} ${t.check}`;
        fb.style.color = '#f39c12';
    }
}

// ---------- 찾기 게임 ----------
function findOption(el, actIdx) {
    const fb = document.getElementById(`find-feedback-${actIdx}`);
    if (!fb) return;
    const isTarget = el.dataset.target === 'true';
    if (isTarget) {
        el.classList.add('correct');
        fb.innerHTML = `${t.correct} 🎉`;
        fb.style.color = '#27ae60';
        document.querySelectorAll(`#find-grid-${actIdx} .find-option`).forEach(o => {
            if (!o.classList.contains('correct')) o.classList.add('wrong');
        });
    } else {
        el.classList.add('wrong');
        fb.innerHTML = `${t.wrong} 😊`;
        fb.style.color = '#e74c3c';
        setTimeout(() => {
            el.classList.remove('wrong');
            fb.innerHTML = '';
        }, 800);
    }
}
