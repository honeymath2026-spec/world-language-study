    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --white: #ffffff;
            --elementary-accent: #1abc9c;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'Noto Sans JP', 'Noto Sans KR', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        
        .back-to-dashboard {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1002;
            font-weight: bold;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-to-dashboard:hover { transform: scale(1.05); background-color: var(--secondary); }
        
        /* 상단 고정 네비게이션 바 */
        .course-nav {
            background: var(--primary);
            color: white;
            padding: 0.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 3px solid var(--elementary-accent);
            position: sticky;
            top: 0;
            z-index: 1001;
        }
        .course-nav h1 { font-size: 1.3rem; }
        .course-nav h1 i { color: var(--elementary-accent); margin-right: 8px; }
        
        .unit-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            max-height: 60px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .unit-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            white-space: nowrap;
        }
        .unit-btn:hover, .unit-btn.active {
            background: var(--elementary-accent);
            color: var(--primary);
        }
        .review-btn {
            background: var(--warning);
            color: var(--primary);
        }
        .review-btn:hover { background: #e67e22; }
        .final-btn { background: var(--danger); }
        .review-divider {
            width: 1px;
            height: 30px;
            background: rgba(255,255,255,0.3);
            margin: 0 4px;
        }
        
        /* ==================== 헤더 (두 번째 고정바) ==================== */
        header {
            background: var(--primary);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 62px;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        header h2 { 
            font-size: 1.2rem; 
            color: #1abc9c;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        
        .nav-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            background: #34495e;
            padding: 8px 15px;
            border-radius: 40px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            transition: 0.2s;
            background: rgba(255,255,255,0.1);
        }
        .nav-links a:hover { background: var(--secondary); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        section {
            background: var(--white);
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            scroll-margin-top: 130px;
        }
        
        h2 {
            border-left: 6px solid var(--elementary-accent);
            padding-left: 15px;
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            text-align: left;
        }
        
        h3 {
            color: var(--elementary-accent);
            margin: 1.5rem 0 1rem 0;
            font-size: 1.3rem;
        }
        
        .reading-box {
            background-color: #f9f9f9;
            padding: 2rem;
            border-radius: 15px;
            line-height: 1.8;
            color: #333;
            border: 2px solid #e0e0e0;
            text-align: left;
            margin-bottom: 30px;
        }
        .reading-box p { margin-bottom: 1rem; text-align: left; }
        .reading-box b, .reading-box strong { color: var(--primary); }
        
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        @media (max-width: 768px) { .vocab-grid { grid-template-columns: 1fr; } }
        
        .vocab-link {
            cursor: pointer;
            color: var(--secondary);
            text-decoration: underline;
            text-decoration-style: dotted;
            transition: 0.2s;
        }
        .vocab-link:hover { color: var(--warning); text-decoration-style: solid; }
        
        .return-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--secondary);
            background: #e8f4fd;
            border: 1px solid var(--secondary);
            border-radius: 20px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .return-btn:hover { background: var(--secondary); color: white; transform: translateY(-2px); }
        
        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: var(--elementary-accent);
        }
        .card-content strong {
            display: block;
            margin-bottom: 8px;
            color: var(--elementary-accent);
            font-size: 1.1rem;
        }
        
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .track-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .track-controls button {
            background: var(--secondary);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .track-controls button:hover { background: #2980b9; }
        .speed-select {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .current-line-box {
            background: #e8f4fd;
            border: 1px solid var(--secondary);
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 10px;
            text-align: left;
            font-size: 1rem;
            line-height: 1.5;
            color: #2c3e50;
        }
        .current-line-text { font-weight: 500; }
        .current-line-text strong { color: var(--secondary); }
        
        .progress-container {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .progress-bar-wrapper {
            flex: 1;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--elementary-accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .progress-time { font-size: 0.75rem; color: #666; min-width: 80px; text-align: center; }

        .script-window {
            margin-top: 15px;
            padding: 20px;
            background: #ffffff;
            border: 1px solid #eee;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .script-line {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .script-line:hover { background: #f0f0f0; }
        .script-line.active {
            background-color: #fff59d;
            border-left: 4px solid var(--warning);
        }
        .toggle-script { background: #95a5a6; }
        .toggle-script:hover { background: #7f8c8d; }
        
        .audio-zone {
            background: #ebf5fb;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--secondary);
            margin: 20px 0;
        }
        .audio-label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .quiz-container {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-top: 10px;
            text-align: left;
        }
        .quiz-question { margin-right: 12px; font-weight: 500; flex: 1; }
        .tf-btn-group { display: inline-flex; gap: 5px; margin: 0 10px; }
        .tf-btn {
            padding: 4px 12px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
        }
        .tf-btn.selected { background: var(--elementary-accent); color: #fff; border-color: var(--elementary-accent); }
        .btn-check-small {
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid var(--secondary);
            background: white;
            color: var(--secondary);
        }
        .btn-check-small:hover { background: var(--secondary); color: white; }
        .answer-text { color: var(--success); font-weight: bold; display: none; margin-left: 10px; }
        
        .speaking-card {
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s, background 0.2s;
            text-align: left;
        }
        .speaking-card:hover { transform: translateX(5px); }
        .speaking-text {
            flex: 1;
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
            text-align: left;
        }
        .speaking-buttons { display: flex; gap: 8px; }
        .speaking-btn {
            background: var(--secondary);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-save-drill {
            background: #f39c12;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .transcript-result {
            width: 100%;
            margin-top: 10px;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
        }
        
        .grammar-box {
            background: #f4f9ff;
            border: 1px solid #d1e3f8;
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
            scroll-margin-top: 130px;
        }
        .grammar-box h3 {
            color: var(--elementary-accent);
            border-left: 4px solid var(--elementary-accent);
            padding-left: 15px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .quiz-item {
            background: #fcfcfc;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #eee;
            margin: 20px 0;
            text-align: left;
            scroll-margin-top: 130px;
        }
        .quiz-item textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
            resize: vertical;
            margin-top: 10px;
        }
        .keywords { margin: 10px 0; font-size: 0.85rem; color: #7f8c8d; }
        
        #critical {
            margin-top: 40px;
            padding: 30px;
            background: #fffde7;
            border-radius: 15px;
            border: 1px solid #fff176;
            text-align: left;
            scroll-margin-top: 130px;
        }
        #critical h3 { color: #f57f17; margin-top: 0; text-align: left; }
        #critical textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 15px;
            resize: vertical;
        }
        
        #ai-solution {
            margin-top: 30px;
            padding: 25px;
            background: #ffffff;
            border-radius: 15px;
            border: 2px solid #3498db;
        }
        
        .ai-criteria-list {
            margin: 20px 0;
            border: 1px solid #eee;
            border-radius: 12px;
            overflow: hidden;
        }
        .criteria-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 15px 20px;
            background: #ffffff;
        }
        .criteria-item:last-child { border-bottom: none; }
        .criteria-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .criteria-score .mini-input {
            width: 50px;
            padding: 4px 8px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .criteria-feedback input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        
        .ai-solution-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ai-solution-header h2 {
            margin-bottom: 0;
            border-left: 6px solid var(--elementary-accent);
            padding-left: 15px;
        }
        .ai-solution-header .overall-score {
            background: #3498db;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            white-space: nowrap;
        }
        .ai-solution-header .overall-score input {
            width: 50px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            text-align: center;
            padding: 4px;
            color: white;
        }
        
        .mini-input {
            width: 60px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .recommendation {
            background: #f4f7f6;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #27ae60;
        }
        .recommendation textarea {
            width: 100%;
            background: transparent;
            border: 1px dashed #27ae60;
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            resize: vertical;
        }
        
        .save-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .save-btn:hover { background: #219150; }
        
        .loading { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--secondary); }
        
        @media (max-width: 768px) {
            .vocab-grid { grid-template-columns: 1fr; }
            .speaking-card { flex-direction: column; align-items: flex-start; }
            header { flex-direction: column; text-align: center; }
            .quiz-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            section { padding: 1.5rem; }
            .unit-selector { justify-content: center; max-height: 80px; }
            .course-nav { flex-direction: column; text-align: center; }
            header { top: 110px; }
        }
    </style>
</head>

// ==================== Listening 관련 전역 변수 ====================
let currentTrackIndex = null;
let currentLineIndex = 0;
let isPlaying = false;
let currentSpeed = 1;
let scriptLines = [];
let totalLinesPerTrack = [];

// ==================== 헬퍼 함수 ====================
function getLevelFolder(level) {
    const mapping = {
        'beginner': '1_Beginner',
        'elementary': '2_Elementary',

        'intermediate': '4_Intermediate',
        'upperintermediate': '5_UpperIntermediate',
        'advanced': '6_Advanced'

    return mapping[level] || '2_Elementary';
}

// ==================== TTS 속도 설정 ====================
function setSpeed(speed) {
    currentSpeed = parseFloat(speed);
    if (window.TTS) window.TTS.setRate(currentSpeed);
}

// ==================== 탐색바 클릭 ====================
function seekToPosition(trackIndex, event) {
    const wrapper = document.getElementById(`progress-wrapper-${trackIndex}`);
    if (!wrapper) return;
    
    const rect = wrapper.getBoundingClientRect();
    const clickX = event.clientX - rect.left;
    let percentage = clickX / rect.width;
    percentage = Math.min(Math.max(percentage, 0), 0.99);
    
    const totalLines = totalLinesPerTrack[trackIndex] || 1;
    let targetLineIndex = Math.floor(percentage * totalLines);
    if (targetLineIndex >= totalLines) targetLineIndex = totalLines - 1;
    
    if (targetLineIndex >= 0 && targetLineIndex < totalLines) {
        if (isPlaying) {
            window.TTS.stop();
            isPlaying = false;
            const playBtn = document.getElementById(`play-pause-${trackIndex}`);
            if (playBtn) playBtn.innerHTML = `▶ ${texts.play_tts}`;
        }
        playFromLine(trackIndex, targetLineIndex);
    }
}

// ==================== 진행률 업데이트 ====================
function updateProgress(trackIndex, currentLineIdx) {
    const fillBar = document.getElementById(`progress-fill-${trackIndex}`);
    const timeDisplay = document.getElementById(`progress-time-${trackIndex}`);
    const totalLines = totalLinesPerTrack[trackIndex] || 1;
    
    if (fillBar) {
        const percentage = ((currentLineIdx + 1) / totalLines) * 100;
        fillBar.style.width = `${percentage}%`;
    }
    if (timeDisplay) {
        timeDisplay.textContent = `${currentLineIdx + 1} / ${totalLines}`;
    }
}

// ==================== 현재 라인 표시 업데이트 ====================
function updateCurrentLineDisplay(trackIndex, lineIndex) {
    const track = listeningData[trackIndex];
    if (!track || !track.script[lineIndex]) return;
    
    const line = track.script[lineIndex];
    const currentLineDiv = document.getElementById(`current-line-${trackIndex}`);
    if (currentLineDiv) {
        const speakerHtml = line.speaker ? `<strong>${line.speaker}:</strong> ` : '';
        currentLineDiv.innerHTML = `<div class="current-line-text">${speakerHtml}${line.text}</div>`;
    }
}

// ==================== 스크립트 라인 하이라이트 ====================
function highlightScriptLine(trackIndex, lineIndex) {
    const container = document.getElementById(`script-container-${trackIndex}`);
    if (!container) return;
    const lines = container.querySelectorAll('.script-line');
    lines.forEach((line, idx) => {
        if (idx === lineIndex) {
            line.classList.add('active');
            line.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            line.classList.remove('active');
        }
    });
}

// ==================== 현재 라인 재생 ====================
function playCurrentLine() {
    if (!isPlaying || currentLineIndex >= scriptLines.length) {
        isPlaying = false;
        const playBtn = document.getElementById(`play-pause-${currentTrackIndex}`);
        if (playBtn) playBtn.innerHTML = `▶ ${texts.play_tts}`;
        return;
    }
    
    updateProgress(currentTrackIndex, currentLineIndex);
    updateCurrentLineDisplay(currentTrackIndex, currentLineIndex);
    highlightScriptLine(currentTrackIndex, currentLineIndex);
    
    const line = scriptLines[currentLineIndex];
    window.TTS.speak(line.text, () => {
        if (isPlaying) {
            currentLineIndex++;
            playCurrentLine();
        }
    });
}

// ==================== 특정 라인부터 재생 ====================
function playFromLine(trackIndex, lineIndex) {
    if (isPlaying) window.TTS.stop();
    
    currentTrackIndex = trackIndex;
    currentLineIndex = lineIndex;
    const track = listeningData[trackIndex];
    if (!track || !track.script) return;
    scriptLines = track.script;
    isPlaying = true;
    
    updateProgress(trackIndex, lineIndex);
    updateCurrentLineDisplay(trackIndex, lineIndex);
    
    const playBtn = document.getElementById(`play-pause-${trackIndex}`);
    if (playBtn) playBtn.innerHTML = `⏸ ${texts.play_tts === 'Play' ? 'Pause' : texts.play_tts === '재생' ? '일시정지' : texts.play_tts === '再生' ? '一時停止' : 'Pause'}`;
    
    playCurrentLine();
}

// ==================== 재생/일시정지 토글 ====================
function togglePlayPause(trackIndex) {
    const playBtn = document.getElementById(`play-pause-${trackIndex}`);
    
    if (isPlaying && currentTrackIndex === trackIndex) {
        window.TTS.stop();
        isPlaying = false;
        if (playBtn) playBtn.innerHTML = `▶ ${texts.play_tts}`;
    } else if (currentTrackIndex === trackIndex && !isPlaying && currentLineIndex < scriptLines.length) {
        isPlaying = true;
        if (playBtn) playBtn.innerHTML = `⏸ ${texts.play_tts === 'Play' ? 'Pause' : texts.play_tts === '재생' ? '일시정지' : texts.play_tts === '再生' ? '一時停止' : 'Pause'}`;
        playCurrentLine();
    } else {
        if (playBtn) playBtn.innerHTML = `⏸ ${texts.play_tts === 'Play' ? 'Pause' : texts.play_tts === '재생' ? '일시정지' : texts.play_tts === '再生' ? '一時停止' : 'Pause'}`;
        playFromLine(trackIndex, 0);
    }
}

// ==================== 스크립트 토글 ====================
function toggleScript(trackIndex) {
    const container = document.getElementById(`script-container-${trackIndex}`);
    const currentBox = document.getElementById(`current-line-${trackIndex}`);
    
    if (!container) return;
    
    if (container.style.display === 'none' || container.style.display === '') {
        container.style.display = 'block';
        if (currentBox) currentBox.style.display = 'none';
    } else {
        container.style.display = 'none';
        if (currentBox) currentBox.style.display = 'block';
    }
}

// ==================== 데이터 로드 ====================
async function loadUnitData() {
    try {
        const unitStr = String(unitNum).padStart(2, '0');
        const levelFolder = getLevelFolder(levelName);
        const dataPath = `../../data/${levelFolder}/unit_${unitStr}.json`;
        
        console.log('📂 Loading from:', dataPath);
        
        const response = await fetch(dataPath);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        unitData = await response.json();
        console.log('✅ Unit data loaded:', unitData.title?.[langCode]);
        
        listeningData = unitData.listening_tracks?.[langCode] || [];
        totalLinesPerTrack = listeningData.map(track => track.script?.length || 0);
        renderFullPage();
        
    } catch (err) {
        console.error('❌ Failed to load:', err);
        document.getElementById('content').innerHTML = `
            <div class="loading" style="color: #e74c3c;">
                <i class="fas fa-exclamation-triangle"></i> Error: ${err.message}<br>
                File: data/2_Elementary/unit_${String(unitNum).padStart(2, '0')}.json
            </div>
        `;
    }
}

// ==================== 단어 TTS 읽기 (카드용) ====================
function speakVocabulary(word, definition) {
    if (window.TTS) {
        const text = `${word}. ${definition}`;
        window.TTS.speak(text);
    } else {
        console.warn('TTS not available');
    }
}

// ==================== 단어 읽고 카드로 이동 (지문용) ====================
function speakAndScroll(wordId, cardId) {
    console.log("🔊 speakAndScroll called with:", wordId, cardId);
    
    let wordToSpeak = wordId;
    if (unitData && unitData.vocabulary && unitData.vocabulary[langCode]) {
        const vocabList = unitData.vocabulary[langCode];
        const vocab = vocabList.find(v => v.id === wordId);
        if (vocab && vocab.pronunciation) {
            wordToSpeak = vocab.pronunciation;
        }
    }
    
    console.log("🔊 Speaking:", wordToSpeak, "in", langCode);
    
    if (window.TTS) {
        window.TTS.speak(wordToSpeak);
    } else if (typeof TTS !== 'undefined' && TTS.init) {
        TTS.init();
        if (window.TTS) window.TTS.speak(wordToSpeak);
    }
    
    const element = document.getElementById(cardId);
    if (element) {
        setTimeout(() => {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            element.style.transition = 'background 0.3s';
            element.style.background = '#fff59d';
            setTimeout(() => {
                if (element) element.style.background = '';
            }, 1500);
        }, 100);
    } else {
        console.warn(`⚠️ Card not found: ${cardId}`);
    }
}

        <section id="reading-plus">
            <h2>${texts.reading_plus_title}</h2>
            <div class="reading-box">
                <h3>${unitData.extra_reading_title?.[langCode] || ''}</h3>
                ${unitData.extra_reading_html?.[langCode] || ''}
            </div>
            <h4>${texts.check_understanding}</h4>
            <div class="quiz-container">${tfHtml}</div>
        </section>
        
        <section id="speaking">
            <h2>${texts.speaking_title}</h2>
            <p class="instruction">${texts.speaking_instruction}</p>
            <div id="dialogue-container">${speakingHtml}</div>
        </section>
        
        <section id="writing">
            <h2>${texts.writing_title}</h2>
            <div class="grammar-box" id="grammar-mastery">
                <h3>${texts.grammar_mastery}</h3>
                ${unitData.grammar_html?.[langCode] || ''}
            </div>
            <div class="quiz-item" id="vocab-check">
                <p><strong>${texts.vocabulary_check}</strong></p>
                ${unitData.vocabulary_check?.[langCode] || '<p>Vocabulary check content will appear here.</p>'}
            </div>
            <div id="step2" class="quiz-item">
                <p><strong>${texts.content_check}</strong></p>
                <p>${unitData.content_check_question?.[langCode] || ''}</p>
                <div class="keywords"><strong>${texts.key_keywords}:</strong> ${unitData.content_check_keywords?.[langCode] || ''}</div>
                <textarea rows="4" placeholder="${unitData.content_check_placeholder?.[langCode] || ''}"></textarea>
            </div>
            <div id="step3" class="quiz-item">
                <p><strong>${texts.deepening}</strong></p>
                <p>${unitData.deepening_question?.[langCode] || ''}</p>
                <textarea rows="5" placeholder="${unitData.deepening_placeholder?.[langCode] || ''}"></textarea>
            </div>
            <div id="critical">
                <h3>${texts.critical_thinking}</h3>
                <p>${unitData.critical_question?.[langCode] || ''}</p>
                <textarea id="critical-answer" rows="8" placeholder="${unitData.critical_placeholder?.[langCode] || ''}"></textarea>
            </div>
        </section>
        
        <section id="ai-solution">
            <div class="ai-solution-header">
                <h2>${texts.ai_solution_title}</h2>
                <span class="overall-score">${texts.overall_score}: <input type="text" class="mini-input" id="overall-score" value=""> / 10</span>
            </div>
            <div class="ai-criteria-list">
                <div class="criteria-item"><div class="criteria-header"><strong>${texts.criteria_content}</strong><span class="criteria-score">${texts.score}: <input type="text" class="mini-input score-content" value=""> / 10</span></div><div class="criteria-feedback"><input type="text" class="feedback-content" placeholder="${texts.feedback}"></div></div>
                <div class="criteria-item"><div class="criteria-header"><strong>${texts.criteria_logic}</strong><span class="criteria-score">${texts.score}: <input type="text" class="mini-input score-logic" value=""> / 10</span></div><div class="criteria-feedback"><input type="text" class="feedback-logic" placeholder="${texts.feedback}"></div></div>
                <div class="criteria-item"><div class="criteria-header"><strong>${texts.criteria_grammar}</strong><span class="criteria-score">${texts.score}: <input type="text" class="mini-input score-grammar" value=""> / 10</span></div><div class="criteria-feedback"><input type="text" class="feedback-grammar" placeholder="${texts.feedback}"></div></div>
                <div class="criteria-item"><div class="criteria-header"><strong>${texts.criteria_vocab}</strong><span class="criteria-score">${texts.score}: <input type="text" class="mini-input score-vocab" value=""> / 10</span></div><div class="criteria-feedback"><input type="text" class="feedback-vocab" placeholder="${texts.feedback}"></div></div>
            </div>
            <div class="recommendation"><p><strong>${texts.recommended_revision}</strong></p><textarea class="recommendation-text" rows="4"></textarea></div>
            <button class="save-btn" onclick="saveMyWork()"><i class="fas fa-save"></i> ${texts.save_work}</button>
        </section>
    `;
    
    document.getElementById('content').innerHTML = fullHtml;
    
    const saved = localStorage.getItem(`unit_${unitNum}_${langCode}_work`);
    if (saved) {
        const data = JSON.parse(saved);
        if (data.step2) document.querySelector('#step2 textarea').value = data.step2;
        if (data.step3) document.querySelector('#step3 textarea').value = data.step3;
        if (data.critical) document.querySelector('#critical-answer').value = data.critical;
    }
}

// ==================== UI 텍스트 적용 ====================
function applyUITexts() {
    document.getElementById('back-text').textContent = texts.back;
    document.getElementById('loading-text').textContent = texts.loading;
    document.getElementById('nav-core').textContent = texts.nav_core;
    document.getElementById('nav-listening').textContent = texts.nav_listening;
    document.getElementById('nav-reading-plus').textContent = texts.nav_reading_plus;
    document.getElementById('nav-speaking').textContent = texts.nav_speaking;
    document.getElementById('nav-writing').textContent = texts.nav_writing;
    document.getElementById('nav-grammar').textContent = texts.nav_grammar;
    document.getElementById('nav-vocab-check').textContent = texts.nav_vocab_check;
    document.getElementById('nav-content-check').textContent = texts.nav_content_check;
    document.getElementById('nav-deepening').textContent = texts.nav_deepening;
    document.getElementById('nav-critical').textContent = texts.nav_critical;
    document.getElementById('nav-ai').textContent = texts.nav_ai;
    document.getElementById('course-title').textContent = 'Elementary Course';
}

// ==================== 저장 함수 ====================
function saveMyWork() {
    const step2 = document.querySelector('#step2 textarea')?.value || '';
    const step3 = document.querySelector('#step3 textarea')?.value || '';
    const critical = document.querySelector('#critical-answer')?.value || '';
    localStorage.setItem(`unit_${unitNum}_${langCode}_work`, JSON.stringify({ step2, step3, critical }));
    alert(`${texts.save_work}!`);
}

function scrollToText(elementId) {
    const element = document.getElementById(elementId);
    if (element) {
        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        element.style.background = '#fff59d';
        setTimeout(() => element.style.background = '', 1500);
    }
}

function speakText(text) {
    if (window.TTS) window.TTS.speak(text);
}

// 전역 함수 노출
window.scrollToText = scrollToText;
window.saveMyWork = saveMyWork;
window.speakText = speakText;
window.speakVocabulary = speakVocabulary;
window.speakAndScroll = speakAndScroll;
window.setSpeed = setSpeed;
window.seekToPosition = seekToPosition;
window.togglePlayPause = togglePlayPause;
window.toggleScript = toggleScript;
window.playFromLine = playFromLine;
window.navigateToUnit = navigateToUnit;
window.navigateToReview = navigateToReview;
window.navigateToFinal = navigateToFinal;

// ==================== 초기화 ====================
document.addEventListener('DOMContentLoaded', function() {
    applyUITexts();
    buildUnitSelector();
    
    if (window.TTS) {
        console.log("🔄 Re-initializing TTS...");
        TTS.init();
        TTS.setLanguage(langCode);
    } else if (typeof TTS !== 'undefined') {
        console.log("🔄 Initializing TTS from global...");
        TTS.init();
        TTS.setLanguage(langCode);
    }
    
    loadUnitData();
});
</script>
</body>
</html>
