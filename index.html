    <style>
        .hero { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, var(--primary) 0%, #1a252f 100%); color: white; border-radius: 20px; margin-bottom: 40px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; opacity: 0.9; }
        .hero-badge { display: inline-block; background: var(--secondary); padding: 5px 15px; border-radius: 30px; font-size: 0.8rem; margin-top: 15px; }
        .level-selector, .series-selector { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .level-btn, .series-btn { background: var(--white); border: 2px solid var(--secondary); color: var(--secondary); padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .level-btn:hover, .series-btn:hover { transform: translateY(-2px); }
        .level-btn.active, .series-btn.active { background: var(--secondary); color: white; }
        .section-title { font-size: 1.3rem; font-weight: bold; margin: 30px 0 15px 0; padding-left: 12px; border-left: 4px solid var(--secondary); color: var(--primary); }
        .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .unit-card { background: var(--white); border-radius: 15px; padding: 20px; transition: all 0.3s; cursor: pointer; border: 1px solid var(--gray-border); text-decoration: none; color: inherit; display: block; }
        .unit-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--secondary); }
        .unit-number { display: inline-block; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-bottom: 12px; }
        .unit-number.midterm { background: var(--danger); }
        .unit-number.song { background: var(--warning); }
        .unit-number.final { background: var(--danger); }
        .unit-number.drill { background: var(--warning); }
        .unit-number.library { background: var(--success); }
        .unit-number.test { background: var(--primary); }
        .unit-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .unit-topic { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .unit-description { font-size: 0.8rem; color: #666; line-height: 1.4; }
        .progress { margin-top: 15px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s; }
        .badge-completed { display: inline-block; background: var(--success); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; margin-top: 10px; }
        .footer { text-align: center; margin-top: 50px; padding: 30px; color: #888; font-size: 0.8rem; border-top: 1px solid var(--gray-border); }
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
            .level-btn, .series-btn { padding: 6px 16px; font-size: 0.8rem; }
            .unit-grid { grid-template-columns: 1fr; }
        }

function getProgressKey(level, series, cardId) {
    return `${currentLanguage}_${level}_${series}_card_${cardId}`;
}

function getCardProgress(level, series, cardId) {
    const key = getProgressKey(level, series, cardId);
    const saved = localStorage.getItem(key);
    if (saved) {
        const data = JSON.parse(saved);
        if (data.quiz) {
            return (data.quiz.score / data.quiz.total) * 100;
        }
    }
    return 0;
}

    document.getElementById('heroTitle').innerHTML = '<i class="fas fa-language"></i> ' + texts.hero_title;
    document.getElementById('heroSubtitle').textContent = texts.hero_subtitle;
    document.getElementById('heroBadge').innerHTML = texts.hero_badge;
    document.getElementById('sectionUnitsTitle').innerHTML = texts.section_units;
    document.getElementById('sectionSpecialTitle').innerHTML = texts.section_special;
    document.getElementById('footerText').textContent = texts.footer;
    document.getElementById('backToDashboard').textContent = texts.back_to_dashboard;
}

// ==================== 레벨 버튼 렌더링 ====================
function renderLevelButtons() {
    const container = document.getElementById('levelSelector');
    if (!container) return;
    
    let html = '';
    for (const [level, data] of Object.entries(levelsData)) {
        const displayName = data.name[currentLanguage] || data.name.en;
        const activeClass = (currentLevel === level) ? 'active' : '';
        html += `<button class="level-btn ${activeClass}" data-level="${level}">${data.emoji} ${displayName}</button>`;
    }
    container.innerHTML = html;
    
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => setLevel(btn.dataset.level));
    });
}

// ==================== 시리즈 버튼 렌더링 ====================
function renderSeriesButtons() {
    const container = document.getElementById('seriesSelector');
    if (!container) return;
    
    let html = '';
    for (const [series, data] of Object.entries(seriesData)) {
        if (series === 'plus' && currentLevel === 'beginner') continue;
        const displayName = data.name[currentLanguage] || data.name.en;
        const activeClass = (currentSeries === series) ? 'active' : '';
        html += `<button class="series-btn ${activeClass}" data-series="${series}">${data.emoji} ${displayName}</button>`;
    }
    container.innerHTML = html;
    
    document.querySelectorAll('.series-btn').forEach(btn => {
        btn.addEventListener('click', () => setSeries(btn.dataset.series));
    });
}

// ==================== 유닛 메타데이터 로드 ====================
// loadUnitMetadata 함수 수정
async function loadUnitMetadata(level) {
    const cards = levelCards[level] || [];
    const metadata = {};
    const levelFolder = getLevelFolder(level);  // 레벨 폴더 매핑 추가
    
    for (const card of cards) {
        if (card.type === 'unit') {
            try {
                const unitStr = String(card.unit).padStart(2, '0');
                // 수정된 경로: data/3_PreIntermediate/unit_01.json
                const response = await fetch(`data/${levelFolder}/unit_${unitStr}.json`);
                if (response.ok) {
                    const unitData = await response.json();
                    metadata[card.unit] = {
                        title: unitData.title || {},
                        topic: unitData.topic || {}
                    };
                } else {
                    metadata[card.unit] = {
                        title: { en: `Unit ${card.unit}`, ko: `${card.unit}과`, ja: `ユニット ${card.unit}`, fr: `Unité ${card.unit}` },
                        topic: { en: '', ko: '', ja: '', fr: '' }
                    };
                }
            } catch (err) {
                console.warn(`Failed to load unit ${card.unit}:`, err);
                metadata[card.unit] = {
                    title: { en: `Unit ${card.unit}`, ko: `${card.unit}과`, ja: `ユニット ${card.unit}`, fr: `Unité ${card.unit}` },
                    topic: { en: '', ko: '', ja: '', fr: '' }
                };
            }
        }
    }
    
    unitMetadata = metadata;
    return metadata;
}

// ==================== 유닛 목록 렌더링 ====================
async function renderUnits() {
    const container = document.getElementById('unitGrid');
    if (!container) return;
    
    const cards = levelCards[currentLevel] || [];
    await loadUnitMetadata(currentLevel);
    
    const texts = i18n[currentLanguage] || i18n.en;
    const names = cardNames[currentLanguage] || cardNames.en;
    
    let html = '';
    for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        const progress = getCardProgress(currentLevel, currentSeries, i);
        
        let title = '', topic = '', unitClass = '', unitLabel = '', description = '', onClickAttr = '';
        
        if (card.type === 'unit') {
            const unit = unitMetadata[card.unit] || {};
            title = unit.title?.[currentLanguage] || unit.title?.en || `${texts.unit} ${card.unit}`;
            topic = unit.topic?.[currentLanguage] || unit.topic?.en || '';
            unitClass = 'unit-number';
            unitLabel = `${texts.unit} ${card.unit}`;
            description = texts.click_to_start;
            onClickAttr = `onclick="goToUnit(${card.unit})"`;
        } else if (card.type === 'quiz') {
            title = names[card.nameKey] || card.nameKey;
            topic = `${texts.units} ${card.range}`;
            unitClass = 'unit-number midterm';
            unitLabel = `📝 ${texts.quiz}`;
            description = texts.click_to_start;
            onClickAttr = `onclick="goToQuiz('${title}', '${card.range}')"`;
        } else if (card.type === 'song') {
            title = names[card.nameKey] || card.nameKey;
            topic = `🎵 ${card.artist}`;
            unitClass = 'unit-number song';
            unitLabel = `🎵 ${texts.song}`;
            description = texts.refresh_break;
            onClickAttr = `onclick="goToSong('${title.replace(/'/g, "\\'")}', '${card.artist.replace(/'/g, "\\'")}')"`;
        } else if (card.type === 'final') {
            title = names[card.nameKey] || card.nameKey;
            topic = texts.comprehensive_test;
            unitClass = 'unit-number final';
            unitLabel = `🏆 ${texts.final}`;
            description = texts.final_desc;
            onClickAttr = 'onclick="goToFinalTest()"';
        }
        
        html += `<div class="unit-card" ${onClickAttr}>
            <div class="${unitClass}">${unitLabel}</div>
            <div class="unit-title">${Utils.escapeHtml(title)}</div>
            <div class="unit-topic">${Utils.escapeHtml(topic)}</div>
            <div class="unit-description">${description}</div>
            <div class="progress"><div class="progress-bar" style="width: ${progress}%"></div></div>
            <div style="font-size: 0.7rem; text-align: right; margin-top: 5px; color: #888;">${Math.round(progress)}${texts.complete}</div>
            ${progress >= 100 ? '<span class="badge-completed">✓ Complete</span>' : ''}
        </div>`;
    }
    container.innerHTML = html;
}

// ==================== 특별 학습 렌더링 ====================
function renderSpecialCards() {
    const container = document.getElementById('specialGrid');
    if (!container) return;
    
    const texts = i18n[currentLanguage] || i18n.en;
    
    let html = '';
    for (const card of specialCards) {
        const title = texts[card.nameKey] || card.nameKey;
        const description = texts[card.descKey] || '';
        let topic = '', onClickAttr = '';
        
        if (card.type === 'drill') {
            topic = texts.speaking_drill;
            onClickAttr = 'onclick="goToDrillCenter()"';
        } else if (card.type === 'library') {
            topic = texts.vocabulary_builder;
            onClickAttr = 'onclick="goToInsightLibrary()"';
        } else if (card.type === 'wordtest') {
            topic = texts.vocabulary_assessment;
            onClickAttr = 'onclick="goToWordTest()"';
        }
        
        html += `<div class="unit-card" ${onClickAttr}>
            <div class="unit-number ${card.type}">${card.icon}</div>
            <div class="unit-title">${title}</div>
            <div class="unit-topic">${topic}</div>
            <div class="unit-description">${description}</div>
        </div>`;
    }
    container.innerHTML = html;
}

// ==================== 네비게이션 함수 ====================
function goToUnit(unit) {
    const folder = getLevelFolder(currentLevel);
    const url = `templates/${folder}/${currentLevel}_template.html?lang=${currentLanguage}&unit=${unit}&series=${currentSeries}`;
    window.location.href = url;
}

function goToQuiz(name, range) {
    const folder = getLevelFolder(currentLevel);
    let fileName = '';
    if (range === '01-04') fileName = 'review_quiz_a.html';
    else if (range === '05-08') fileName = 'review_quiz_b.html';
    else if (range === '09-12') fileName = 'review_quiz_c.html';
    else if (range === '13-16') fileName = 'review_quiz_d.html';
    
    window.location.href = `templates/${folder}/${fileName}?lang=${currentLanguage}&range=${range}`;
}

function goToSong(name, artist) {
    const folder = getLevelFolder(currentLevel);
    let fileName = '';
    
    if (name.includes('Wonderful World') || name.includes('왓 어 원더풀') || name.includes('What A Wonderful')) {
        fileName = 'song_wonderful_world.html';
    } else if (name.includes('My Love') || name.includes('마이 러브')) {
        fileName = 'song_my_love.html';
    } else {
        const texts = i18n[currentLanguage] || i18n.en;
        alert(`${texts.song}: ${name}\n${artist}\n\n${texts.preparing}`);
        return;
    }
    
    window.location.href = `templates/${folder}/${fileName}?lang=${currentLanguage}`;
}

function goToFinalTest() {
    const folder = getLevelFolder(currentLevel);
    window.location.href = `templates/${folder}/final_test.html?lang=${currentLanguage}`;
}

function goToDrillCenter() {
    window.location.href = `drill_center.html?lang=${currentLanguage}&level=${currentLevel}&series=${currentSeries}`;
}

// ==================== 레벨/시리즈 변경 ====================
function setLevel(level) {
    currentLevel = level;
    localStorage.setItem('dashboard_level', level);
    
    const levelName = levelsData[level]?.name[currentLanguage] || levelsData[level]?.name.en || level;
    document.getElementById('levelBadge').textContent = `🌍 ${levelName}`;
    
    renderLevelButtons();
    renderSeriesButtons();
    renderUnits();
    renderSpecialCards();
}

function setSeries(series) {
    currentSeries = series;
    localStorage.setItem('dashboard_series', series);
    
    renderSeriesButtons();
    renderUnits();
}

// ==================== 언어 설정 ====================
function setLanguage(lang) {
    currentLanguage = lang;
    localStorage.setItem('dashboard_language', lang);
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.lang === lang) btn.classList.add('active');
    });
    
    updateUILanguage(lang);
    
    const levelName = levelsData[currentLevel]?.name[currentLanguage] || levelsData[currentLevel]?.name.en || currentLevel;
    document.getElementById('levelBadge').textContent = `🌍 ${levelName}`;
    
    renderLevelButtons();
    renderSeriesButtons();
    renderUnits();
    renderSpecialCards();
    
    if (window.TTS) TTS.setLanguage(lang);
}

// ==================== 초기화 ====================
async function init() {
    const savedLang = localStorage.getItem('dashboard_language');
    const savedLevel = localStorage.getItem('dashboard_level');
    const savedSeries = localStorage.getItem('dashboard_series');
    
    if (savedLang && i18n[savedLang]) currentLanguage = savedLang;
    if (savedLevel && levelsData[savedLevel]) currentLevel = savedLevel;
    if (savedSeries && seriesData[savedSeries]) currentSeries = savedSeries;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === currentLanguage) btn.classList.add('active');
    });
    
    renderLevelButtons();
    renderSeriesButtons();
    
    const levelName = levelsData[currentLevel]?.name[currentLanguage] || levelsData[currentLevel]?.name.en || currentLevel;
    document.getElementById('levelBadge').textContent = `🌍 ${levelName}`;
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });
    
    updateUILanguage(currentLanguage);
    
    if (window.TTS) {
        TTS.init();
        TTS.setLanguage(currentLanguage);
    }
    
    await renderUnits();
    renderSpecialCards();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
